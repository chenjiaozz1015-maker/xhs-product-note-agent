<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>{{ app_title }} - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}" />
  </head>
  <body>
    <main class="page auth-page">
      <section class="card auth-card">
        <a class="auth-back" href="/">返回首页</a>
        <div class="auth-heading">
          <p class="section-label">账号登录</p>
          <h1>登录后继续生成种草素材</h1>
          <p>使用已注册邮箱登录，继续生成图片素材包和发布文案。</p>
        </div>

        {% if warning %}
        <div class="form-message form-message-warning">{{ warning }}</div>
        {% endif %}
        {% if error %}
        <div class="form-message form-message-error">{{ error }}</div>
        {% endif %}

        <form class="auth-form" action="/login" method="post">
          <input type="hidden" name="next" value="{{ next or '/' }}" />
          <label class="field">
            <span>邮箱</span>
            <input name="email" type="email" value="{{ email or '' }}" required />
          </label>
          <label class="field">
            <span>密码</span>
            <input name="password" type="password" required />
          </label>
          <button class="btn btn-primary" type="submit">登录</button>
        </form>

        <p class="auth-switch">没有账号？<a href="/register">去注册</a></p>
      </section>
      <p class="version-note">种草机 {{ app_version }} 月度额度版</p>
    </main>
  </body>
</html>
